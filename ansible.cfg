[defaults]
# Путь к файлу инвентаря
inventory = inventory.ini

# Имя пользователя на удаленном хосте (если не совпадает с текущим)
# remote_user = ubuntu

# Отключение проверки host key (удобно для новых серверов, но снижает безопасность)
host_key_checking = False

# Путь для поиска ролей и коллекций
collections_path = ./collections
roles_path = ./roles

# Формат вывода логов (дает больше информации о времени выполнения)
callbacks_enabled = profile_tasks

[ssh_connection]
# Ускорение выполнения за счет переиспользования SSH соединений
pipelining = True
scp_if_ssh = True
control_path = /tmp/ansible-ssh-%%h-%%p-%%r
